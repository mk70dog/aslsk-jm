<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ASL SK Judge">
<title>ASL SK Judge v4.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#080808;color:#ccddee;font-family:monospace;min-height:100dvh;overflow-x:hidden}
button{font-family:monospace;cursor:pointer;touch-action:manipulation}

#hdr{background:linear-gradient(180deg,#1a1a2e 0%,#0d0d1a 100%);border-bottom:2px solid #0055aa;padding:8px 12px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:14px;font-weight:bold;letter-spacing:0.15em;color:#c8a032;text-shadow:0 0 10px #c8a03244}
.subtitle{font-size:9px;color:#8899aa;letter-spacing:0.12em;margin-top:1px}
.hdr-btns{display:flex;gap:5px;align-items:center}
.tabclr{background:transparent;border:1px solid #0055aa44;color:#0055aa;padding:4px 8px;border-radius:2px;font-size:9px;letter-spacing:0.05em}
.allclr{background:transparent;border:1px solid #c8a03244;color:#c8a032;padding:4px 8px;border-radius:2px;font-size:9px;letter-spacing:0.05em}

#mbar{background:#040408;border-bottom:1px solid #0d0d1a;padding:3px 12px;display:flex;gap:10px;align-items:center}
.mdot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
.mdot.grn{background:#00aa55;box-shadow:0 0 5px #00aa55}
.mdot.blu{background:#0055aa;box-shadow:0 0 5px #0055aa;animation-delay:0.7s}
.mdot.gld{background:#c8a032;box-shadow:0 0 5px #c8a032;animation-delay:1.4s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.mlbl{font-size:9px;color:#223344;letter-spacing:0.08em}

#nav{background:#0a0a14;border-bottom:1px solid #0d0d1a;padding:3px 5px}
.nav-row{display:grid;gap:2px;margin-bottom:2px}
.nav-row-1{grid-template-columns:repeat(7,1fr)}
.nav-row-2{grid-template-columns:repeat(6,1fr)}
.nb{background:#040408;border:1px solid #0d0d1a;color:#8899aa;padding:6px 1px;font-size:9px;font-family:monospace;text-align:center;border-radius:2px;transition:all 0.12s}
.nb.on{background:linear-gradient(180deg,#0a1a3a,#061228);border-color:#0055aa;color:#4499dd;box-shadow:0 0 6px #0055aa22}

#main{padding:8px 12px 70px}

.card{background:linear-gradient(180deg,#111118,#0d0d14);border:1px solid #1a1a2e;border-radius:4px;padding:11px 13px;margin-bottom:9px;box-shadow:inset 0 1px 0 #ffffff06}
.card-alt{background:linear-gradient(180deg,#0d0d14,#080810)}

.sh{font-size:10px;color:#0055aa;letter-spacing:0.12em;border-bottom:1px solid #1a1a2e;padding-bottom:6px;margin-bottom:9px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.sh::before{content:'';width:2px;height:10px;background:#0055aa;border-radius:1px}
.lbl{font-size:9px;color:#8899aa;letter-spacing:0.08em;margin-bottom:3px;text-transform:uppercase}

.btns{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
/* === BUTTON STYLE A: グロー発光ボタン === */
.b{
  background:linear-gradient(180deg,#1a1c22 0%,#0e1018 50%,#1a1c22 100%);
  border:1px solid #2a2e3a;border-top:1px solid #3a3e4a;border-bottom:1px solid #0a0c10;
  color:#8899aa;padding:7px 12px;border-radius:3px;font-size:11px;font-family:monospace;
  cursor:pointer;box-shadow:0 2px 4px #00000066,inset 0 1px 0 #ffffff08;
  letter-spacing:0.03em;transition:all 0.12s;
}
.b.on{
  background:linear-gradient(180deg,#061228 0%,#0a1a3a 50%,#061228 100%);
  border:1px solid #0044aa;border-top:1px solid #0066cc;border-bottom:1px solid #002266;
  color:#4499ee;box-shadow:0 0 10px #0055aa44,inset 0 0 8px #0033aa22,inset 0 1px 0 #0066ff22;
  text-shadow:0 0 8px #0066ff66;
}
.b.grn.on{
  background:linear-gradient(180deg,#061a0e 0%,#0a2a18 50%,#061a0e 100%);
  border:1px solid #008844;border-top:1px solid #00bb55;border-bottom:1px solid #004422;
  color:#00dd66;box-shadow:0 0 10px #00aa5544,inset 0 1px 0 #00ff4422;
  text-shadow:0 0 8px #00ff6666;
}
.b.gld.on{
  background:linear-gradient(180deg,#1a1006 0%,#2a1a0a 50%,#1a1006 100%);
  border:1px solid #aa8822;border-top:1px solid #ccaa33;border-bottom:1px solid #665500;
  color:#c8a032;box-shadow:0 0 10px #c8a03244,inset 0 1px 0 #ffcc2222;
  text-shadow:0 0 8px #c8a03266;
}
.b.red.on{
  background:linear-gradient(180deg,#1a0606 0%,#2a0a0a 50%,#1a0606 100%);
  border:1px solid #aa2222;border-top:1px solid #cc3333;border-bottom:1px solid #660000;
  color:#ee3333;box-shadow:0 0 10px #cc333344,inset 0 1px 0 #ff333322;
  text-shadow:0 0 8px #ff222266;
}
.b.sm{padding:5px 9px;font-size:10px}
/* === BUTTON STYLE B: トグルスイッチ === */
.tog-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tog{
  width:44px;height:22px;
  background:linear-gradient(180deg,#0a0c12,#141620);
  border:1px solid #2a2e3a;border-radius:11px;
  position:relative;cursor:pointer;flex-shrink:0;
  box-shadow:inset 0 2px 4px #00000088;transition:all 0.2s;
}
.tog.on{background:linear-gradient(180deg,#061228,#0a1a3a);border-color:#0055aa;box-shadow:inset 0 2px 4px #00000088,0 0 6px #0055aa44}
.tog.grn.on{background:linear-gradient(180deg,#061a0e,#0a2a18);border-color:#008844;box-shadow:inset 0 2px 4px #00000088,0 0 6px #00aa5544}
.tog::after{
  content:'';width:18px;height:18px;
  background:linear-gradient(180deg,#3a3e4a,#2a2e3a);
  border-radius:50%;position:absolute;top:1px;left:1px;
  transition:all 0.2s;box-shadow:0 1px 3px #00000066;
}
.tog.on::after{left:25px;background:linear-gradient(180deg,#4499ee,#2266cc);box-shadow:0 1px 3px #00000066,0 0 5px #0055aa88}
.tog.grn.on::after{left:25px;background:linear-gradient(180deg,#44ee88,#22aa55);box-shadow:0 1px 3px #00000066,0 0 5px #00aa5588}
.tog-lbl{font-size:11px;color:#8899aa;transition:color 0.2s}
.tog.on + .tog-lbl{color:#4499ee}
.tog.grn.on + .tog-lbl{color:#00dd66}
/* === BUTTON STYLE C: セグメントセレクター === */
.seg{display:flex;gap:0;margin-bottom:8px}
.seg .b{border-radius:0;border-right:none}
.seg .b:first-child{border-radius:3px 0 0 3px}
.seg .b:last-child{border-radius:0 3px 3px 0;border-right:1px solid #2a2e3a}
.seg .b.on:last-child{border-right:1px solid #0044aa}

.db{width:44px;height:44px;background:#040408;border:1px solid #1a1a2e;color:#8899aa;border-radius:2px;font-size:15px;font-weight:bold;font-family:monospace;transition:all 0.1s}
.db.on{background:linear-gradient(180deg,#0a1a3a,#061228);border-color:#0055aa;color:#4499dd;box-shadow:0 0 8px #0055aa33}
.dbs{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}

.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;max-width:175px;margin-bottom:6px}
.npbtn{background:#040408;border:1px solid #1a1a2e;color:#aabbcc;padding:11px 6px;border-radius:2px;font-size:15px;font-weight:bold;font-family:monospace;text-align:center;transition:all 0.1s}
.npbtn:active{background:#0a1020;border-color:#0055aa44}
.npbtn.del{color:#cc3333;border-color:#cc333322}
.fp-disp{background:#040408;border:1px solid #1a1a2e;border-radius:2px;padding:7px 12px;font-size:24px;font-weight:bold;color:#c8a032;text-align:center;margin-bottom:5px;min-height:42px;text-shadow:0 0 8px #c8a03244}

.swrow{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.swlbl{min-width:90px;font-size:11px;color:#8899aa}
.cb{width:34px;height:34px;background:#040408;border:1px solid #1a1a2e;color:#8899aa;border-radius:2px;font-size:14px;font-family:monospace}
.cb.on{background:linear-gradient(180deg,#0a1a3a,#061228);border-color:#0055aa;color:#4499dd}
.cnum{min-width:20px;text-align:center;color:#c8a032;font-weight:bold;font-size:13px}

.lrow{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.llbl{min-width:105px;font-size:11px}

.gc{background:#0d0d14;border:1px solid #1a1a2e;border-left:2px solid #0055aa;border-radius:3px;padding:9px 11px;margin-bottom:7px}
.gh{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.ghl{color:#0055aa;font-size:11px;font-weight:bold}
.ghr{color:#c8a032;font-size:11px}
.delbtn{background:transparent;border:1px solid #cc333344;color:#cc3333;padding:1px 7px;border-radius:2px;font-size:10px}

.sum{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.sumcard{background:linear-gradient(180deg,#111118,#0d0d14);border:1px solid #1a1a2e;border-radius:4px;padding:9px}
.sumval{font-size:24px;font-weight:bold;font-family:monospace;text-shadow:0 0 6px currentColor}

.notebox{background:#0d0d14;border:1px solid #1a1a2e;border-radius:3px;padding:6px 9px;margin-bottom:9px;font-size:10px;display:grid;grid-template-columns:auto 1fr;gap:3px 8px;align-items:center;color:#8899aa}

.res{border-radius:4px;padding:13px;margin-bottom:9px;border-width:2px;border-style:solid}
.rmain{border-radius:2px;padding:9px 12px;margin:7px 0;font-size:14px;font-weight:bold;letter-spacing:0.04em}
.rnote{font-size:11px;margin-bottom:4px;padding-left:6px;border-left:2px solid #1a1a2e}
.rrow{display:flex;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.rv{font-size:28px;font-weight:bold;font-family:monospace;text-shadow:0 0 8px currentColor}
.rarr{color:#1a1a2e;font-size:18px;margin:0 3px}

.resfp{background:linear-gradient(180deg,#0a1a0a,#061006);border:2px solid #00aa55;border-radius:4px;padding:9px 13px;margin-top:7px}

.uc{background:#0d0d14;border:1px solid #1a1a2e;border-left:2px solid #0055aa;border-radius:3px;padding:7px 9px;margin-bottom:5px}
.ul{font-size:13px;font-weight:bold}
.us{display:flex;gap:10px;margin-top:3px;font-size:10px;color:#8899aa;flex-wrap:wrap}

.scbtn{background:#040408;border:1px solid #1a1a2e;border-radius:3px;padding:7px 9px;margin:2px;cursor:pointer;text-align:left}
.scbtn.on{background:linear-gradient(180deg,#0a1a3a,#061228);border-color:#0055aa}
.vbox{background:#0d0d14;border:1px solid #0055aa22;border-radius:3px;padding:7px;margin-bottom:7px;font-size:12px}
.ssr{background:#0d0d14;border:1px solid #c8a03222;border-radius:3px;padding:5px 7px;margin-bottom:4px;font-size:11px}

.addbtn{width:100%;background:transparent;border:1px dashed #1a1a2e;color:#8899aa;padding:7px;border-radius:3px;font-size:12px;font-family:monospace;margin-top:3px}

.resetbtn{background:transparent;border:1px solid #1a1a2e;color:#8899aa;padding:4px 13px;border-radius:2px;font-size:11px;font-family:monospace;margin-top:7px}

.judgbtn{width:100%;background:linear-gradient(180deg,#0a1a3a,#061228);border:1px solid #0055aa;color:#4499dd;padding:10px;border-radius:2px;font-size:13px;font-weight:bold;font-family:monospace;letter-spacing:0.04em;box-shadow:0 0 8px #0055aa22;margin-top:6px}

.divider{height:1px;background:linear-gradient(90deg,transparent,#8899aa22,transparent);margin:9px 0}

.infobox{background:#0a0a14;border:1px solid #0055aa22;border-radius:3px;padding:8px 10px;margin-bottom:8px;font-size:11px;color:#8899aa}
.infobox.grn{border-color:#00aa5522;background:#0a140a}
.infobox.gld{border-color:#c8a03222;background:#14100a}

.ift-table{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:8px}
.ift-table th{background:#0a0a14;border:1px solid #1a1a2e;padding:4px 5px;color:#0055aa;text-align:center;font-weight:bold}
.ift-table td{background:#040408;border:1px solid #1a1a2e;padding:3px 5px;text-align:center;color:#8899aa}
.ift-table td.mc{color:#c8a032}.ift-table td.kia{color:#cc3333}.ift-table td.k{color:#cc8800}.ift-table td.ptc{color:#00aa55}.ift-table td.cur{background:#0a1a3a;border-color:#0055aa}

.mv-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.mv-table th{background:#0a0a14;border:1px solid #1a1a2e;padding:4px 7px;color:#0055aa;text-align:left}
.mv-table td{background:#040408;border:1px solid #1a1a2e;padding:3px 7px;color:#ccddee}
.mv-table td.v{color:#c8a032;text-align:right}

#ftr{text-align:center;color:#0d0d1a;font-size:9px;padding:10px;border-top:1px solid #0d0d1a;letter-spacing:0.1em}
</style>
</head>

}

  }
  return null;
}

function exSW(){var l=[];SWT.forEach(function(t){var n=(getFireState().swc[t.id]||0);for(var i=0;i<n;i++)l.push({id:t.id,uid:t.id+"_"+i,lbl:n>1?t.lbl+" #"+(i+1):t.lbl,fp:t.fp,b:t.b,x:t.x,rof:t.rof});});return l;}
function swMap(){var m={};exSW().forEach(function(s){m[s.uid]=s;});return m;}
function losTotal(f){return LOS_OBS.reduce(function(s,o){return s+((f.los[o.id]||0)*o.d);},0);}
function fireDRM(f){return f.tem+f.ldr+(f.cx?1:0)+losTotal(f)+(f.ffmo?-1:0)+(f.ffnam?-1:0);}

function gfp(g,ph,m){
  var hs=g.ut==="hs",hasSW=g.sw.length>0;
  var base=(hs&&hasSW)?0:g.fp;
  var sf=g.sw.reduce(function(s,uid){return s+(m[uid]?m[uid].fp:0);},0);
  var f=base+sf;
  if(g.st==="pinned"||g.ut==="smc")f=f/2;
  if(ph==="AFPh"){
    if(g.sh==="pbf"){if(g.af&&g.ut==="squad")f=f+1;}
    else if(g.sh==="tpbf"){f=f*3/2;if(g.af&&g.ut==="squad")f=Math.ceil(f)+1;}
    else if(g.sh==="long"){f=f/4;}
    else{f=f/2;if(g.af&&g.ut==="squad")f=Math.ceil(f)+1;}
  } else {
    if(g.sh==="pbf")f=f*2;
    else if(g.sh==="tpbf")f=f*3;
    else if(g.sh==="long")f=f/2;
  }
  return f;
}
function totalFP(f,ph){
  var m=swMap();
  var raw=f.grps.reduce(function(s,g){return s+gfp(g,ph,m);},0);
  return Math.min(36,Math.max(0.5,raw)); // 36超は36でcap
}
function totalFP_raw(f,ph){ // 表示用(cap前)
  var m=swMap();
  return Math.max(0.5,f.grps.reduce(function(s,g){return s+gfp(g,ph,m);},0));
}

// =====================================================
function FJUDGE_COMMON(fst,ph){
  var r=fst.rd,w=fst.wd;
  if(!r||!w)return;
  var raw=r+w,drm=fireDRM(fst),mod=raw+drm;
  var tp=totalFP(fst,ph);
  var it=iftR(tp,mod);
  var hasPinned=fst.grps.some(function(g){return g.st==="pinned";});
  var isCower=(r===w)&&fst.ldr===0;
  var cowerCols=0;
  if(isCower){var hasGreen=fst.grps.some(function(g){return g.green;});cowerCols=hasGreen?2:1;}
  if(isCower&&cowerCols>0){var nc=Math.max(0,it.ci-cowerCols);it={r:IFT[Math.max(0,Math.min(10,mod-2))][nc],col:IFT_LBL[nc],ci:nc,cowered:true,cowerCols:cowerCols};}
  var insts=exSW();
  var swr=insts.map(function(s){
    var rofResult=null;
    if(s.rof>0){
      if(ph==="AFPh")rofResult="AFPh→維持不可";
      else if(hasPinned)rofResult="クギ付けあり→維持不可";
      else if(isCower)rofResult="畏縮発生→維持不可";
      else rofResult=r<=s.rof?"維持成功":"維持失敗";
    }
    var xFail=s.x<99&&raw>=s.x;
    return{lbl:s.lbl,b:s.b,x:s.x,fail:s.b<99&&raw>=s.b&&!xFail,xFail:xFail,ro:rofResult};
  });
  var res2=null;
  if(ph==="DFF"||ph==="SFF"||ph==="FPF"){
    var plusDRM=(fst.cx?1:0)+losTotal(fst)+(fst.ldr>0?fst.ldr:0);
    var tbl=RES_TBL[it.ci]||[0,0,0,0];
    res2={fp:tbl[Math.min(plusDRM,3)]||0,plusDRM:plusDRM,baseBaseFP:tbl[0]};
  }
  return{raw:raw,mod:mod,drm:drm,ift:it,cow:isCower,cowerCols:cowerCols,swr:swr,res:res2,fp:tp};
}

// FIRE EVENTS
// =====================================================
function Fset(k,v){var f=getFireState();f[k]=v;f.res=null;Draw();}
function Ftog(k){var f=getFireState();f[k]=!f[k];f.res=null;Draw();}
function FtemSet(id,v){var f=getFireState();f.temId=id;f.tem=v;f.res=null;Draw();}
function FswInc(id){var f=getFireState();f.swc[id]=Math.min(4,(f.swc[id]||0)+1);f.res=null;Draw();}
function FswDec(id){
  var f=getFireState();var cur=f.swc[id]||0;
  if(cur>0){var ru=id+"_"+(cur-1);f.grps.forEach(function(g){g.sw=g.sw.filter(function(u){return u!==ru;});});}
  f.swc[id]=Math.max(0,cur-1);f.res=null;Draw();
}
function FlosI(id){var f=getFireState();f.los[id]=(f.los[id]||0)+1;f.res=null;Draw();}
function FlosD(id){var f=getFireState();f.los[id]=Math.max(0,(f.los[id]||0)-1);f.res=null;Draw();}
function FgsSet(id,k,v){var f=getFireState();f.grps.forEach(function(g){if(g.id===id)g[k]=v;});f.res=null;Draw();}
function FtogSW(gid,uid){
  var f=getFireState();
  f.grps.forEach(function(g){if(g.id!==gid)return;var i=g.sw.indexOf(uid);if(i>=0)g.sw.splice(i,1);else g.sw.push(uid);});
  f.res=null;Draw();
}
function FaddG(){var f=getFireState();f.grps.push({id:f.nid++,ut:"squad",st:"good",fp:0,af:false,green:false,sh:"normal",sw:[]});f.res=null;Draw();}
function FremG(id){var f=getFireState();f.grps=f.grps.filter(function(g){return g.id!==id;});f.res=null;Draw();}
function Fdie(k,v){var f=getFireState();f[k]=v;f.res=null;Draw();}
function FRES(){var f=getFireState();f.res=null;f.rd=0;f.wd=0;f.casualNat=null;f.casualUnit=null;Draw();}
function NPAD(gid,d){
  var f=getFireState();
  f.grps.forEach(function(g){
    if(g.id!==gid)return;
    if(d==="C")g.fp=0;
    else if(d==="BS")g.fp=Math.floor(g.fp/10);
    else{var n=g.fp*10+parseInt(d);if(n<=99)g.fp=n;}
  });
  f.res=null;Draw();
}
function FCN(nat){var f=getFireState();f.casualNat=nat;f.casualUnit=null;Draw();}
function FCU(idx){
  var f=getFireState();var cm=CASUAL_MAP[f.casualNat]||{},keys=Object.keys(cm);
  if(idx===-1)f.casualUnit="HS";
  else f.casualUnit=keys[idx]||null;
  Draw();
}

function MSTAT(s,ef){
  if(s==="ok")return{t:"MC成功",c:"#00aa55",i:"👍"};
  if(s==="pin")return{t:"クギ付け状態",c:"#c8a032",i:"📌"};
  if(s==="brk")return{t:ef?"MC失敗＋クラス低下":"MC失敗→混乱＋DM",c:ef?"#cc3333":"#cc8800",i:ef?"‼":"😵"};
  if(s==="ptcOk")return{t:"PTC成功(クギ付けなし)",c:"#00aa55",i:"👍"};
  if(s==="ptcPin")return{t:"PTC失敗→クギ付け状態",c:"#c8a032",i:"📌"};
  if(s==="auto")return{t:"自動失敗＋損耗(DR12)",c:"#aa0000",i:"☠"};
  return{t:s,c:"#aaa",i:"?"};
}
function MS(k,v){S.mc[k]=v;S.mc.res=null;Draw();}
function MS_die(k,v){S.mc[k]=v;S.mc.res=null;Draw();}
function MRES(){S.mc.res=null;S.mc.rd=0;S.mc.wd=0;S.mc.elrUnit=null;Draw();}
function ME_nat(n){S.mc.elrNat=n;S.mc.elrUnit=null;Draw();}
function ME_unit(idx){var em=ELR_MAP[S.mc.elrNat]||{},keys=Object.keys(em);S.mc.elrUnit=keys[idx]||null;Draw();}
function MJUDGE(){
  var m=S.mc,r=m.rd,w=m.wd;if(!r||!w)return;
  var mcDRM=m.ptc?0:{NMC:0,"1MC":1,"2MC":2,"3MC":3}[m.type]||0;
  var tdrm=mcDRM+m.ldr+(m.dm?4:0);
  var raw=r+w,mod=raw+tdrm,st,ef=false;
  if(raw===12)st="auto";
  else if(m.ptc)st=mod<=m.mor?"ptcOk":"ptcPin";
  else{
    if(mod<m.mor)st="ok";
    else if(mod===m.mor)st="pin";
    else{st="brk";if(m.utype==="mmc"&&!m.ldrImm&&mod>m.mor+m.elr)ef=true;}
  }
  S.mc.res={raw:raw,mod:mod,st:st,ef:ef};Draw();
}

  else{var n=c[side]*10+parseInt(d);if(n<=99)c[side]=n;}
  c.res=null;Draw();
}

function CJUDGE(){
  var c=S.cc,r=c.rd,w=c.wd;if(!r||!w)return;
  function ratio(a,d){var rv=a/d;if(rv>=6)return 7;if(rv>=5)return 6;if(rv>=4)return 5;if(rv>=3)return 4;if(rv>=2)return 3;if(rv>=1)return 2;if(rv>=0.5)return 1;return 0;}
  var ri=ratio(c.af,c.df),elim=CCT_N[ri];
  var raw=r+w,mod=raw+c.adrm;
  var st=mod<elim?"elim":mod===elim?"cas":"miss";
  S.cc.res={raw:raw,mod:mod,st:st,pro:raw===2};Draw();
}

  }
  h+='</table></div>';
  h+='<div class="infobox" style="margin-top:5px;font-size:10px">K/#=損耗1個+残り全員MC(DRM+#) / #KIA=最低#個除去+残全員混乱DM</div>';
  h+='</div>';
  // 地形TEM
  h+='<div class="card"><div class="sh">地形効果修正値(TEM)</div>';
  h+='<table class="mv-table"><tr><th>地形</th><th>TEM</th><th>LOS</th></tr>';
  [{t:"開豁地・道路",v:0,l:"妨害なし"},{t:"繁み",v:0,l:"+1DRM"},{t:"麦バタケ(6〜9月)",v:0,l:"+1DRM"},
   {t:"果樹園",v:0,l:"+1DRM"},{t:"林ヘクスサイド",v:0,l:"+1DRM"},{t:"林ヘクス内",v:1,l:"妨害なし"},
   {t:"生垣(ヘクスサイド)",v:1,l:"妨害なし"},{t:"丘(高度優位性)",v:1,l:"妨害なし"},
   {t:"木造建物",v:2,l:"妨害なし"},{t:"石造建物",v:3,l:"妨害なし"},
   {t:"煙幕手榴弾",v:0,l:"+2DRM"},{t:"完全煙幕",v:0,l:"+3DRM"}].forEach(function(r){
    h+='<tr><td>'+r.t+'</td><td class="v">'+(r.v>0?"+"+r.v:"±0")+'</td><td style="color:#0055aa;text-align:right;font-size:10px">'+r.l+'</td></tr>';
  });
  h+='</table></div>';
  // CCT
  h+='<div class="card"><div class="sh">CCT(白兵戦表)</div>';
  h+='<table class="mv-table"><tr><th>戦闘比</th><th>除去ナンバー</th></tr>';
  CCT_R.forEach(function(r,i){h+='<tr><td>'+r+'</td><td class="v">'+CCT_N[i]+'</td></tr>';});
  h+='</table><div class="infobox" style="margin-top:5px;font-size:10px">修正後DR &lt; 除去ナンバー → 除去 / = 除去ナンバー → 損耗</div></div>';
  // ELR置換
  h+='<div class="card"><div class="sh">ELR超過クラス低下チェーン</div>';
  Object.keys(UNITS).forEach(function(nat){
    var ud=UNITS[nat];
    h+='<div style="margin-bottom:6px"><div style="font-size:11px;color:'+ud.col+';margin-bottom:3px">'+ud.lbl+'</div>';
    ud.elr.forEach(function(e){h+='<div style="font-size:11px;color:#8899aa;padding:1px 0">'+e.f+' → <b style="color:#c8a032">'+e.t+'</b></div>';});
    h+='</div>';
  });
  h+='</div>';
  return h;
}

// =====================================================
// SCEN PAGE
// =====================================================
function SCEN_PAGE(){
  var s=S.scen,h="";
  h+='<div class="card"><div class="sh">シナリオ選択</div><div style="display:flex;flex-wrap:wrap">';
  SCN.forEach(function(sc){
    h+='<button class="scbtn'+(s.sel===sc.id?" on":"")+'" onclick="SSEL(\''+sc.id+'\')">';
    h+='<div style="font-weight:bold;color:#c8a032">'+sc.id+'</div>';
    h+='<div style="font-size:10px;margin-top:2px">'+sc.jp+'</div></button>';
  });
  h+='</div></div>';
  if(s.sel){
    var sc=SCN.filter(function(x){return x.id===s.sel;})[0];
    h+='<div class="card">';
    h+='<div style="font-size:10px;color:#8899aa">'+sc.id+' / '+sc.en+'</div>';
    h+='<div style="font-size:15px;font-weight:bold;color:#c8a032;margin:4px 0 7px">'+sc.jp+'</div>';
    h+='<div style="font-size:11px;color:#8899aa;margin-bottom:7px">📍 '+sc.loc+'　📅 '+sc.dt+'　⏱ '+sc.trn+'ターン</div>';
    h+='<div class="vbox"><div style="font-size:10px;color:#0055aa;margin-bottom:3px">🏆 勝利条件</div>'+sc.vic+'</div>';
    if(sc.bal)h+='<div class="infobox" style="margin-bottom:7px"><span style="color:#c8a032">⚖ バランス</span>　米：'+sc.bal.us+'　独/ソ：'+sc.bal.ger+'</div>';
    if(sc.ssr&&sc.ssr.length)sc.ssr.forEach(function(r,i){h+='<div class="ssr"><span style="color:#c8a032">SSR'+(i+1)+'</span> '+r+'</div>';});
    h+='</div>';
    Object.keys(sc.f).forEach(function(nat){
      var f=sc.f[nat],nc={USA:"#4477aa",GER:"#aa9944",SOV:"#aa4444"}[nat]||"#666";
      var nl={USA:"🇺🇸 米軍",GER:"🇩🇪 独軍",SOV:"🇷🇺 ソ連"}[nat]||nat;
      h+='<div class="card"><div style="font-size:12px;font-weight:bold;color:'+nc+';margin-bottom:5px">'+nl+' [ELR:'+f.elr+']</div>';
      f.u.forEach(function(u){h+='<div style="font-size:11px;color:#8899aa;border-left:2px solid '+nc+'33;padding-left:6px;margin-bottom:3px">'+u+'</div>';});
      h+='</div>';
    });
  }
  return h;
}
function SSEL(id){S.scen.sel=id;Draw();}

// =====================================================
// UNIT PAGE
// =====================================================
function UNIT_PAGE(){
  var u=S.unit,d=UNITS[u.nat],h="";
  h+='<div class="card"><div class="sh">国籍</div>';
  h+='<div style="display:flex;gap:5px;margin-bottom:9px">';
  Object.keys(UNITS).forEach(function(k){h+='<button class="b'+(u.nat===k?" on":"")+'" style="flex:1" onclick="US(\'nat\',\''+k+'\')">'+UNITS[k].lbl+'</button>';});
  h+='</div>';
  h+='<div class="btns">';
  h+='<button class="b'+(u.tab==="mmc"?" on":"")+'" onclick="US(\'tab\',\'mmc\')">MMC(分隊・HS)</button>';
  h+='<button class="b'+(u.tab==="smc"?" on":"")+'" onclick="US(\'tab\',\'smc\')">SMC(指揮官)</button>';
  h+='<button class="b'+(u.tab==="sw"?" on":"")+'" onclick="US(\'tab\',\'sw\')">SW(支援火器)</button>';
  h+='</div></div>';
  var nc=d.col;
  if(u.tab==="mmc"){
    d.mmc.forEach(function(m){
      h+='<div class="uc" style="border-left-color:'+(m.green?"#cc8800":nc)+'"><div class="ul">'+m.lbl;
      if(m.af)h+='<span style="font-size:9px;background:#c8a03222;border:1px solid #c8a03244;color:#c8a032;padding:1px 5px;border-radius:2px;margin-left:4px">FP下線(AF)</span>';
      if(m.sr)h+='<span style="font-size:9px;background:#0055aa22;border:1px solid #0055aa44;color:#0055aa;padding:1px 5px;border-radius:2px;margin-left:4px">自己回復</span>';
      if(m.ei)h+='<span style="font-size:9px;background:#c8a03222;border:1px solid #c8a03244;color:#c8a032;padding:1px 5px;border-radius:2px;margin-left:4px">ELR免除</span>';
      if(m.hs)h+='<span style="font-size:9px;background:#1a1a2e;border:1px solid #1a1a2e;color:#8899aa;padding:1px 5px;border-radius:2px;margin-left:4px">HS</span>';
      if(m.green)h+='<span style="font-size:9px;background:#cc880022;border:1px solid #cc880044;color:#cc8800;padding:1px 5px;border-radius:2px;margin-left:4px">未熟兵</span>';
      h+='</div>';
      h+='<div class="us"><span>FP <b style="color:#ccddee">'+m.fp+'</b></span><span>射程 <b style="color:#ccddee">'+m.rng+'</b></span><span>士気 <b style="color:#ccddee">'+m.mor+'</b></span><span>混乱士気 <b style="color:#ccddee">'+m.bm+'</b></span>'+(m.smk?'<span>煙幕 <b style="color:#c8a032">'+m.smk+'</b></span>':'')+'</div>';
      if(m.note)h+='<div style="font-size:9px;color:#8899aa;margin-top:2px">'+m.note+'</div>';
      h+='</div>';
    });
    if(d.elr&&d.elr.length){
      h+='<div class="card"><div style="font-size:10px;color:#0055aa;margin-bottom:5px">⬇ ELR超過クラス低下チェーン</div>';
      d.elr.forEach(function(e){h+='<div style="font-size:11px;color:#8899aa;padding:2px 0">'+e.f+' → <b style="color:#c8a032">'+e.t+'</b></div>';});
      h+='</div>';
    }
  }
  if(u.tab==="smc"){
    d.smc.forEach(function(s){
      var cc=s.cmd<0?"#c8a032":s.cmd>0?"#cc3333":"#334455";
      h+='<div class="uc" style="border-left-color:'+nc+'"><div class="ul">'+s.lbl+'</div>';
      h+='<div class="us"><span>士気 <b style="color:#ccddee">'+s.mor+'</b></span><span>混乱士気 <b style="color:#ccddee">['+s.bm+']</b></span><span>指揮 <b style="color:'+cc+'">'+(s.cmd===0?"±0":s.cmd>0?"+"+s.cmd:s.cmd)+'</b></span></div>';
      if(s.note)h+='<div style="font-size:9px;color:#8899aa;margin-top:2px">'+s.note+'</div>';
      h+='</div>';
    });
  }
  if(u.tab==="sw"){
    SWT.forEach(function(s){
      h+='<div class="card"><div class="ul">'+s.lbl+'</div>';
      h+='<div class="us"><span>FP <b style="color:#ccddee">'+s.fp+'</b></span>'+(s.b<99?'<span>B# <b style="color:#cc8800">'+s.b+'</b></span>':'')+(s.x<99?'<span>X# <b style="color:#cc3333">'+s.x+'</b></span>':'')+'<span>ROF <b style="color:#ccddee">'+(s.rof||"—")+'</b></span><span>PP <b style="color:#ccddee">'+s.pp+'</b></span></div>';
      h+='</div>';
    });
    h+='<div class="card"><div class="ul">DC 30-1(爆薬)</div>';
    h+='<div class="us"><span>FP <b style="color:#ccddee">30</b></span><span>X# <b style="color:#cc3333">12(エリート以外10)</b></span><span>PP <b style="color:#ccddee">3</b></span></div>';
    h+='<div style="font-size:10px;color:#8899aa;margin-top:3px">MPh配置→AFPh爆発。TEM適用(生垣除く)。CX時DRM+1。</div></div>';
  }
  return h;
}
function US(k,v){S.unit[k]=v;Draw();}

// INIT
window.onload=function(){TAB("pfph");};
</script>
