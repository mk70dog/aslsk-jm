  h+='<button class="b sm'+(!g.drm.non_qual?' on':'')+'" onclick="GsetDRM(\'non_qual\',false)">操作班（Crew）通常</button>';
  h+='<button class="b sm red'+(g.drm.non_qual?' on':'')+'" onclick="GsetDRM(\'non_qual\',true)">MMC操作（+2TH, B#-2）</button>';
  h+='</div></div>';

  // Moving gun
  h+='<div style="background:#0a0e18;border:1px solid #1a1a2e;border-radius:3px;padding:5px">';
  h+='<div style="font-size:8px;color:#8899aa;margin-bottom:3px">砲の移動 Moving Gun (+2TH)</div>';
  h+='<div class="btns" style="margin:0">';
  h+='<button class="b sm'+(!g.drm.moving?' on':'')+'" onclick="GsetDRM(\'moving\',0)">移動なし</button>';
  h+='<button class="b sm red'+(g.drm.moving?' on':'')+'" onclick="GsetDRM(\'moving\',2)">移動中 (+2)</button>';
  h+='</div></div>';

  // Shooter elevation
  h+='<div style="background:#0a0e18;border:1px solid #1a1a2e;border-radius:3px;padding:5px">';
  h+='<div style="font-size:8px;color:#8899aa;margin-bottom:3px">射撃者の高低差 Elev (射撃者が高い: −1)</div>';
  h+='<div class="btns" style="margin:0">';
  [{v:0,l:'同高'},{v:-1,l:'-1(射撃者↑)'}].forEach(function(e){
    h+='<button class="b sm'+(g.drm.sndr_elev===e.v?' on':'')+
      '" style="padding:1px 6px" onclick="GsetDRM(\'sndr_elev\','+e.v+')">'+e.l+'</button>';
  });
  h+='</div></div>';

  // Target elevation
  h+='<div style="background:#0a0e18;border:1px solid #1a1a2e;border-radius:3px;padding:5px">';
  h+='<div style="font-size:8px;color:#8899aa;margin-bottom:3px">目標の高低差 Elev (目標が高い: +1)</div>';
  h+='<div class="btns" style="margin:0">';
  [{v:0,l:'同高'},{v:1,l:'+1(目標↑)'}].forEach(function(e){
    h+='<button class="b sm'+(g.drm.tgt_elev===e.v?' on':'')+
      '" style="padding:1px 6px" onclick="GsetDRM(\'tgt_elev\','+e.v+')">'+e.l+'</button>';
  });
  h+='</div></div>';

  h+='</div>';// end grid

  // ── 捕捉（TA）喪失条件パネル ──
  if(g.acq_level>0){
    h+='<div style="background:#1a1000;border:1px solid #c8a03244;border-radius:3px;padding:6px 8px;margin-bottom:6px">';
    h+='<div style="font-size:8px;color:#c8a032;margin-bottom:4px">⚠ 捕捉あり（'+['','-1','-2'][g.acq_level]+'DRM）— 以下の行動で自動喪失</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">';
    [
      ["Gset(\'emplaced\',false);GloseAcq(\'移動\')","🚶 砲が移動","移動→据付喪失+TA喪失"],
      ["GloseAcq(\'CA変更(DRM設定済)\')","↩ CA変更","上のCA変更DRM設定後にタップ"],
      ["GloseAcq(\'故障\')","🔧 故障","Malfunction発生"],
      ["Gset(\'ife_mode\',true);GloseAcq(\'IFE\')","⚡ IFE使用","IFE射撃"],
      ["GloseAcq(\'乗員損耗\')","☠ 乗員損耗","乗員がGOを失う"],
      ["GloseAcq(\'煙幕\')","💨 煙幕射撃","Smoke弾発射"],
      ["GloseAcq(\'固有火力\')","🔫 固有火力射撃","砲がInherent FPを使用"],
    ].forEach(function(row){
      h+='<button class="b sm red" style="font-size:8px;text-align:left;padding:3px 5px" onclick="'+row[0]+';Draw()">'
        +'<div style="font-weight:bold">'+row[1]+'</div>'
        +'<div style="font-size:7px;color:#8899aa;font-weight:normal">'+row[2]+'</div></button>';
    });
    h+='</div>';
    if(g.acq_lossReason){
      h+='<div style="font-size:8px;color:#cc5555;margin-top:4px">捕捉喪失: '+g.acq_lossReason+'</div>';
    }
    h+='</div>';
  }

  // DRM summary
  var drmTotal=gunTotalDRM();
  var finalTH=curTH>0?(curTH-drmTotal):0;
  h+='<div class="infobox" style="color:'+(drmTotal>0?"#cc8800":drmTotal<0?"#7a9a5a":"#8899aa")+'">';
  h+='合計DRM: '+(drmTotal>0?"+":"")+drmTotal;
  if(curTH>0) h+=' → 有効TH# = <strong style="color:#4499ee">'+finalTH+'</strong>';
  h+='</div>';

  // Dice input for TH roll
  if(curTH>0&&!belowMinRange&&!inBuildingBlock){
    h+='<div class="lbl" style="margin-top:8px">サイコロ (TH判定)</div>';
    h+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">';
    h+='<div><div style="font-size:8px;color:#8899aa;margin-bottom:2px">白ダイ</div>';
    h+='<div class="btns" style="margin:0">';
    h+=rDiceHTML(g.wd,false,'GsetWD');
    h+='</div></div>';
    h+='<div><div style="font-size:8px;color:#cc4444;margin-bottom:2px">赤ダイ (故障判定)</div>';
    h+='<div class="btns" style="margin:0">';
    h+=rDiceHTML(g.rd,true,'GsetRD');
    h+='</div></div></div>';

    if(g.wd&&g.rd){
      h+='<button class="judg3d" onclick="GJUDGE_TH()">TH判定実行</button>';
    }
  }

  // TH RESULT
  if(g.th_result){
    var r=g.th_result;
    var hitColor=r.hit?"#4a8a4a":r.malfunction?"#cc3333":"#8a4a4a";
    h+='<div style="background:#0d0d14;border:2px solid '+hitColor+';border-radius:5px;padding:10px;margin-top:8px">';
    h+='<div style="font-size:10px;color:#8899aa;margin-bottom:4px">DR '+r.dr+' + DRM '+(r.drm>=0?"+":"")+r.drm+' = 修正後 <strong>'+r.modDr+'</strong> vs TH# <strong>'+r.thNum+'</strong></div>';
    if(r.destruction){
      h+='<div style="font-size:16px;font-weight:bold;color:#cc3333">破壊！ (赤ダイ '+g.rd+' ≥ X# '+r.xNum+')</div>';
    } else if(r.malfunction){
      h+='<div style="font-size:16px;font-weight:bold;color:#cc8800">⚠ 故障 (赤ダイ '+g.rd+' ≥ B# '+r.bNum+')</div>';
    } else if(r.hit){
      if(r.isCH){
        h+='<div style="font-size:16px;font-weight:bold;color:#ff6600">⚡ クリティカルヒット（CH）！　原DR=2</div>';
        h+='<div style="font-size:9px;color:#c8a032;margin-top:3px">砲目標→砲・乗員を自動破壊（STEP 2で処理）。歩兵目標→FP×2でIFT解決（TEM逆適用）。</div>';
      } else {
        h+='<div style="font-size:18px;font-weight:bold;color:#4a8a4a">✅ 命中！ STEP 2へ進む</div>';
      }
    } else {
      h+='<div style="font-size:16px;font-weight:bold;color:#8a4a4a">❌ 外れ ('+r.modDr+' > TH# '+r.thNum+')</div>';
      if(Math.abs(r.modDr-r.thNum)<=1&&!r.malfunction){
        h+='<div style="font-size:9px;color:#c8a032;margin-top:3px">→ 至近弾: 捕捉マーカー付与</div>';
      }
    }
    h+='</div>';
  }
  h+='</div>';// end card 2

  // ---- CARD 3: POST-HIT (IFT or TK) ----
  if(g.th_result&&g.th_result.hit){
    var ammoObj=gd.ammo.find(function(a){return a.type===g.ammoType;})||gd.ammo[0];
    var isAP=(ammoObj.type==="AP"||ammoObj.he===0);
    var isCH=!!(g.th_result.isCH);

    h+='<div class="card"><div class="sh">STEP 2: 効果判定'+(isCH?' <span style="color:#ff6600;font-size:9px">⚡CH</span>':'')+'</div>';

    // CH on Gun target → auto-destroy gun and crew, skip IFT
    if(isCH&&gd.thType!=="area"){
      h+='<div style="background:#1a0800;border:2px solid #ff660066;border-radius:5px;padding:10px;margin-bottom:8px">';
      h+='<div style="font-size:14px;font-weight:bold;color:#ff6600;margin-bottom:6px">⚡ クリティカルヒット — 砲目標自動破壊</div>';
      h+='<div style="display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:9px">';
      h+='<span style="color:#ff6600">砲カウンター</span><span style="color:#ccddee">即時除去（IFT不要）</span>';
      h+='<span style="color:#ff6600">乗員</span><span style="color:#ccddee">全員除去（KIA確定）</span>';
      h+='<span style="color:#ff6600">捕捉</span><span style="color:#8899aa">消去</span>';
      h+='<span style="color:#445566">根拠</span><span style="color:#556677">SK#2 6.1 / 6.7: CHは砲・乗員を自動破壊</span>';
      h+='</div></div>';
      // CH on infantry via IFT: FP doubled, TEM reversed
      if(!isAP){
        var chFP=((ammoObj?ammoObj.he:8)||8)*2;
        var chDRM=-(g.drm.tem); // TEM reversed for CH on infantry
        h+='<div style="background:#0d0d14;border:1px solid #ff660033;border-radius:3px;padding:7px;margin-bottom:6px;font-size:8px;color:#8899aa">'
          +'歩兵への付随効果: FP×2（'+chFP+'FP）でIFT解決。TEM符号逆転（−'+g.drm.tem+'→ DRM'+(chDRM>=0?"+":"")+chDRM+'）。同ヘクス他ユニットも対象。</div>';
      }
    } else if(isCH&&gd.thType==="area"){
      // CH on area fire target
      h+='<div style="background:#0a0c14;border:1px solid #ff660033;border-radius:3px;padding:7px;margin-bottom:6px;font-size:8px;color:#c8a032">'
        +'面制圧CHは砲目標ヘクス内から1ユニットをランダム選択。FP×2でIFT解決。TEM符号逆転。</div>';
    }
    if(isAP&&TK_TABLE[gd.cal]){
      // AP vs vehicle → TK table
      h+='<div class="infobox gld" style="color:#c8a032">AP弾 → To Kill表で解決（DR ≤ TK#で撃破）</div>';
      var tkBand=gunTKrange(g.range);
      var tkNum=(TK_TABLE[gd.cal]||[])[tkBand]||0;
      h+='<div style="text-align:center;padding:6px;color:#4499ee;font-size:14px">TK# = <strong>'+tkNum+'</strong> ('+["PB≤1","至近2-4","中距離5-8","長距離9+"][tkBand]+')</div>';
      h+='<div class="lbl">サイコロ (TK判定 2d6)</div>';
      h+='<div style="display:flex;gap:8px;margin-bottom:6px">';
      h+='<div class="btns" style="margin:0">';
      h+=rDiceHTML(g.ift_wd,false,'GsetIFT_WD');
      h+='</div>';
      h+='<div class="btns" style="margin:0">';
      h+=rDiceHTML(g.ift_rd,true,'GsetIFT_RD');
      h+='</div></div>';
      if(g.ift_wd&&g.ift_rd){
        h+='<button class="judg3d" onclick="GJUDGE_TK()">TK判定実行</button>';
      }
      if(g.ift_result&&g.ift_result.type==="TK"){
        var tkr=g.ift_result;
        h+='<div style="background:#0d0d14;border:2px solid '+(tkr.kill?"#4a8a4a":"#8a4a4a")+'44;border-radius:5px;padding:10px;margin-top:8px">';
        h+='<div style="font-size:10px;color:#8899aa">DR '+tkr.dr+' vs TK# '+tkr.tkNum+'</div>';
        h+='<div style="font-size:18px;font-weight:bold;color:'+(tkr.kill?"#4a8a4a":"#8a4a4a")+'">'+(tkr.kill?"✅ 撃破！":"❌ 効果なし")+'</div>';
        h+='</div>';
      }
    } else {
      // HE → IFT
      h+=GUN_IFT_SECTION(gd,true);
    }
    h+='</div>';
  }

  // ---- ACQ + RESET ----
  h+=GUN_ACQ_CARD();
  h+='<div class="card"><div class="sh">Shot Reset</div>';
  h+='<button class="b" onclick="GresetShot()">次の射撃へリセット（捕捉保持）</button>';
  h+='<button class="b red" style="margin-left:4px" onclick="Gset(\'th_result\',null);Gset(\'ift_result\',null)">結果クリア</button>';
  h+='</div>';

  return h;
}

function GUN_IFT_SECTION(gd,showHeader){
  // ── SK#2 6.7 Gun as Target ──
  // IFT解決 → KIA=砲破壊+乗員全除去 / K=砲故障+乗員損耗 / Near Miss=砲楯DRM加算して乗員効果
  var g=S.gun;
  var ammoObj=gd.ammo.find(function(a){return a.type===g.ammoType;})||gd.ammo[0];
  var fp=g.ife_mode?gd.ife:ammoObj.he;
  // ATT(面制圧): IFT側にTEM/妨害を適用。ITT/VTT: IFT時は修正なし
  var gd2=gd;
  var effTgt2=g.tgtType||(gd2?gd2.thType:"inf");
  var drm=(effTgt2==="area")?(g.drm.tem+g.drm.hinder):0;
  var gsVal=gd.gs||0;
  var h='';
  if(showHeader){
    h+='<div class="infobox" style="color:#c8a032">HE弾 → IFTで解決（FP='+fp+'）'
      +'　<span style="color:#8899aa">※KIA=砲破壊　K=砲故障+損耗　それ以外=Near Miss→砲楯適用</span></div>';
  }
  h+='<div style="text-align:center;padding:4px;color:#4499ee">IFT列: <strong>'+fp+'FP</strong>　DRM: '+(drm>=0?"+":"")+drm+'</div>';
  h+='<div class="lbl">サイコロ (IFT 2d6)</div>';
  h+=rDiceHTML(g.ift_wd,false,'GsetIFT_WD');
  h+=rDiceHTML(g.ift_rd,true,'GsetIFT_RD');
  if(g.ift_wd&&g.ift_rd){
    h+='<button class="judg3d" onclick="GJUDGE_IFT()">IFT判定実行</button>';
  }

  if(g.ift_result&&!g.ift_result.type){
    var ir=g.ift_result;
    var res=ir.res;
    var raw=ir.result||"";

    // ── IFT結果の分類（SK#2 6.7）──
    // KIA系: 砲破壊 + 乗員全除去（Direct Hit）
    // K系: 砲故障 + 乗員損耗（Direct Hit）
    // それ以外: Near Miss → 砲楯DRMを加算して乗員効果を判定
    var isKIA=/KIA/.test(raw);
    var isK=!isKIA&&/^K[0-9]?$/.test(raw.trim());
    var isDirectHit=isKIA||isK;
    var isNearMiss=!isDirectHit&&raw!=="-";

    h+='<div style="background:#0d0d14;border:2px solid '+(isKIA?"#cc3333":isK?"#cc8800":res.c)+'44;border-radius:5px;padding:10px;margin-top:8px">';
    h+='<div style="font-size:10px;color:#8899aa;margin-bottom:4px">DR '+ir.dr
      +(ir.drm!==0?' + DRM '+(ir.drm>=0?"+":"")+ir.drm+' = 修正後 '+ir.modDr:'')
      +'　FP列: '+ir.col+'</div>';
    h+='<div style="font-size:16px;font-weight:bold;color:'+(isKIA?"#cc3333":isK?"#cc8800":res.c)+'">'+res.i+' '+res.t+'</div>';
    h+='</div>';

    // ── Direct Hit: KIA ──
    if(isKIA){
      h+='<div style="background:#1a0000;border:2px solid #cc333366;border-radius:5px;padding:10px;margin-top:6px">';
      h+='<div style="font-size:12px;font-weight:bold;color:#cc3333;margin-bottom:6px">砲への直撃（KIA） — 砲破壊</div>';
      h+='<div style="display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:9px">';
      h+='<span style="color:#cc5555">砲カウンター</span><span style="color:#ccddee">ゲームから除去（永久破壊）</span>';
      h+='<span style="color:#cc5555">乗員</span><span style="color:#ccddee">全員除去（KIA）</span>';
      h+='<span style="color:#cc5555">砲楯</span><span style="color:#8899aa">Direct Hitには不適用</span>';
      h+='<span style="color:#cc5555">捕捉</span><span style="color:#8899aa">消去</span>';
      h+='</div></div>';
    }
    // ── Direct Hit: K ──
    else if(isK){
      h+='<div style="background:#1a0a00;border:2px solid #cc880066;border-radius:5px;padding:10px;margin-top:6px">';
      h+='<div style="font-size:12px;font-weight:bold;color:#cc8800;margin-bottom:6px">砲への直撃（K） — 砲故障+損耗</div>';
      h+='<div style="display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:9px">';
      h+='<span style="color:#c8a032">砲カウンター</span><span style="color:#ccddee">故障面に反転（Malfunction）</span>';
      h+='<span style="color:#c8a032">乗員</span><span style="color:#ccddee">損耗（Casualty Reduction）— 分隊→HS、HSは除去</span>';
      h+='<span style="color:#c8a032">砲楯</span><span style="color:#8899aa">Direct Hitには不適用</span>';
      h+='<span style="color:#c8a032">修理</span><span style="color:#8899aa">次のRPhに修理判定可（修理タブへ）</span>';
      h+='</div></div>';
    }
    // ── Near Miss → 砲楯サブステップ ──
    else if(isNearMiss){
      h+='<div style="background:#0a0c10;border:1px solid '+(gsVal>0?"#c8a03244":"#2a2e3a")+';border-radius:5px;padding:10px;margin-top:6px">';
      h+='<div style="font-size:11px;font-weight:bold;color:#c8a032;margin-bottom:6px">至近弾（Near Miss）— 砲楯処理</div>';

      if(gsVal>0){
        // 砲楯あり
        var gsModDr=ir.modDr+gsVal;
        var gsIt=iftR(fp,gsModDr);
        var gsRes=rm(gsIt.r);
        h+='<div style="font-size:8px;color:#8899aa;margin-bottom:7px">'
          +'砲への攻撃は砲に効果なし。乗員へは砲楯DRM +'+gsVal+' を元のDRに加算して再判定。'
          +(gsVal===1?' (迫撃砲: +1)':' (AT/INF砲: +2)')
          +'<br>条件: 乗員Good Order かつ 攻撃がCAを通過している場合のみ適用。'
          +'</div>';
        h+='<div style="display:grid;grid-template-columns:auto auto auto auto;gap:4px 10px;font-size:9px;margin-bottom:8px;align-items:center">';
        h+='<span style="color:#445566">元のDR</span><span style="color:#ccddee;font-weight:bold">'+ir.modDr+'</span>';
        h+='<span style="color:#445566">砲楯DRM</span><span style="color:#c8a032;font-weight:bold">+'+gsVal+'</span>';
        h+='<span style="color:#445566">適用後DR</span><span style="color:#4499ee;font-weight:bold">'+gsModDr+'</span>';
        h+='<span style="color:#445566">FP列</span><span style="color:#8899aa">'+fp+'fp</span>';
        h+='</div>';
        // 砲楯適用後の結果ボックス
        h+='<div style="background:#0d0d14;border:2px solid '+gsRes.c+'44;border-radius:4px;padding:8px">';
        h+='<div style="font-size:8px;color:#8899aa;margin-bottom:3px">砲楯適用後 → 乗員への実効果</div>';
        h+='<div style="font-size:15px;font-weight:bold;color:'+gsRes.c+'">'+gsRes.i+' '+gsRes.t+'</div>';
        h+='</div>';
        // 砲への効果
        h+='<div style="margin-top:6px;font-size:8px;color:#556677">'
          +'砲カウンター自体には効果なし（Near Missは砲を傷つけない）。</div>';
      } else {
        // 砲楯なし（FTなど）
        h+='<div style="font-size:8px;color:#8899aa;margin-bottom:6px">'
          +'この砲には砲楯がありません。乗員への効果は元のIFT結果をそのまま適用。</div>';
        h+='<div style="background:#0d0d14;border:2px solid '+res.c+'44;border-radius:4px;padding:8px">';
        h+='<div style="font-size:8px;color:#8899aa;margin-bottom:3px">乗員への効果（砲楯なし）</div>';
        h+='<div style="font-size:15px;font-weight:bold;color:'+res.c+'">'+res.i+' '+res.t+'</div>';
        h+='</div>';
      }
      h+='</div>';
    }
    // ── 効果なし（-） ──
    else{
      h+='<div style="font-size:9px;color:#556677;margin-top:6px;padding:6px;background:#0a0c14;border-radius:3px">効果なし。砲・乗員ともに影響なし。</div>';
    }
  }
  return h;
}

function GUN_ACQ_CARD(){
  var g=S.gun;
  var h='<div class="card"><div class="sh">Acquisition (捕捉)</div>';
  h+='<div class="infobox" style="color:'+(g.acq_level>0?"#c8a032":"#556677")+'">';
  h+='現在の捕捉: '+(['なし','-1 (捕捉)','−2 (完全捕捉)'][g.acq_level]||'なし')+'</div>';
  h+='<div class="btns">';
  h+='<button class="b sm'+(g.drm.acq===0?" on":"")+'" onclick="GsetDRM(\'acq\',0);S.gun.acq_level=0;S.gun.acq_active=false;Draw()">捕捉なし</button>';
  h+='<button class="b sm'+(g.drm.acq===-1?" on":"")+'" onclick="GsetDRM(\'acq\',-1);S.gun.acq_level=1;S.gun.acq_active=true;Draw()">−1 捕捉</button>';
  h+='<button class="b sm'+(g.drm.acq===-2?" on":"")+'" onclick="GsetDRM(\'acq\',-2);S.gun.acq_level=2;S.gun.acq_active=true;Draw()">−2 完全捕捉</button>';
  h+='</div>';
  h+='<div style="font-size:8px;color:#556677;margin-top:4px">命中または至近弾で自動付与。CA変更・目標変更・目標がLOS外で消去。</div>';
  h+='<button class="b sm" onclick="GclearAcq()">捕捉クリア</button>';
  h+='</div>';
  return h;
}

// =====================================================
// LATW PAGE (SK#2 LATW Rules)
// =====================================================
function latwData(){return LATW_DATA.find(function(w){return w.id===S.latw.wepId;})||null;}
function latwTH(w,rng){var idx=Math.max(0,Math.min(w.th.length-1,rng-1));return w.th[idx]||0;}
function LATWset(k,v){S.latw[k]=v;S.latw.th_result=null;S.latw.ift_result=null;S.latw.bb_result=null;Draw();}
function LATWsetDRM(k,v){S.latw.drm[k]=v;S.latw.th_result=null;Draw();}
function LATWsetTEM(tid,v){S.latw.drm.tem=v;S.latw.drm.temId=tid;S.latw.th_result=null;Draw();}
function LATWwd(v){S.latw.wd=v;S.latw.th_result=null;Draw();}
function LATWrd(v){S.latw.rd=v;S.latw.th_result=null;Draw();}
function LATWift_wd(v){S.latw.ift_wd=v;S.latw.ift_result=null;Draw();}
function LATWift_rd(v){S.latw.ift_rd=v;S.latw.ift_result=null;Draw();}

function LATW_JUDGE_TH(){
  var ld=S.latw,w=latwData();if(!w||!ld.wd||!ld.rd)return;
  var dr=ld.wd+ld.rd,thNum=latwTH(w,ld.range);
  var drm=ld.drm.tem+ld.drm.hinder+(ld.drm.backblast?2:0);
  var modDr=dr+drm;
  var isCH=(dr===2)&&(modDr<=thNum);
  var pfSelfHit=w.oneShot&&(dr>=(ld.inexperienced?11:12));
  var hit=(thNum>0)&&(modDr<=thNum)&&!pfSelfHit;
  S.latw.th_result={hit:hit,dr:dr,modDr:modDr,thNum:thNum,drm:drm,isCH:isCH,pfSelfHit:pfSelfHit};
  Draw();
}
function LATW_JUDGE_IFT(){
  var ld=S.latw,w=latwData();if(!w||!ld.ift_wd||!ld.ift_rd)return;
  var dr=ld.ift_wd+ld.ift_rd,isCH=!!(ld.th_result&&ld.th_result.isCH);
  var ammo0=w.ammo[0]||{};
  if(ld.tgtType==="infantry"&&ld.tgtInBuilding){
    var fp=isCH?w.infantryBuilding*2:w.infantryBuilding;
    var it=iftR(fp,dr),res=rm(it.r);
    S.latw.ift_result={type:"IFT",fp:fp,dr:dr,col:it.col,result:it.r,res:res};
  } else if(ld.tgtType!=="infantry"){
    var tk=(ammo0.tk||15)*(isCH?2:1);
    S.latw.ift_result={type:"TK",dr:dr,tkNum:tk,kill:(dr<=tk),isCH:isCH};
  } else {
    var fp2=isCH?2:1,it2=iftR(fp2,dr);
    S.latw.ift_result={type:"IFT",fp:fp2,dr:dr,col:it2.col,result:it2.r,res:rm(it2.r)};
  }
  Draw();
}

function LATW_PAGE(){
  var ld=S.latw,w=latwData(),h='';

  // Card1: 武器選択
  h+='<div class="card"><div class="sh">LATW 対戦車携行兵器 (SK#2)</div>';
  h+='<div class="lbl">武器選択</div><div class="btns">';
  LATW_DATA.forEach(function(wep){
    var sel=(ld.wepId===wep.id);
    h+='<button class="b sm'+(sel?' on':'')+'" onclick="LATWset(\'wepId\',\''+wep.id+'\')">'+wep.lbl+'</button>';
  });
  h+='</div>';
  if(!w){h+='<div class="infobox">↑ 武器を選択してください</div></div>';return h;}

  // スペック
  var ammo0=w.ammo[0]||{};
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin:6px 0">';
  [{l:"口径",v:w.cal+"mm"},{l:"射程",v:w.rng+"hex"},{l:"TK#",v:ammo0.tk||"—"},{l:"バックブラスト",v:w.backblast?"あり":"なし"},
   {l:"射撃回数",v:w.oneShot?"1発限り":"複数"},{l:"建物内歩兵",v:w.infantryBuilding+"FP列"},{l:"国籍",v:w.nat},{l:"備考",v:w.note||"—"}
  ].forEach(function(s){
    h+='<div style="background:#0a0e18;border:1px solid #1a1a2e;border-radius:2px;padding:3px 4px;text-align:center">'
      +'<div style="font-size:7px;color:#445566">'+s.l+'</div>'
      +'<div style="font-size:9px;font-weight:bold;color:#ccddee">'+s.v+'</div></div>';
  });
  h+='</div></div>';

  // Card2: TH
  h+='<div class="card"><div class="sh">STEP 1: To Hit判定</div>';

  // 射距離
  h+='<div class="lbl">射距離（ヘクス）</div><div class="btns">';
  for(var ri=1;ri<=w.rng;ri++){
    var thN=w.th[ri-1]||0;
    h+='<button class="b sm'+(ld.range===ri?' on':'')+'" onclick="LATWset(\'range\','+ri+')">'+ri
      +' <span style="font-size:7px;color:#8899aa">TH'+thN+'</span></button>';
  }
  h+='</div>';
  if(ld.range>0){
    h+='<div class="infobox" style="color:#4499ee">基本TH# = <strong>'+latwTH(w,ld.range)+'</strong>（射距離'+ld.range+'）</div>';
  }

  // 目標種別
  h+='<div class="lbl">目標種別</div><div class="btns">';
  [{v:"vehicle",l:"車両"},{v:"gun",l:"砲"},{v:"infantry",l:"歩兵"}].forEach(function(t){
    h+='<button class="b sm'+(ld.tgtType===t.v?' on':'')+'" onclick="LATWset(\'tgtType\',\''+t.v+'\')">'+t.l+'</button>';
  });
  h+='</div>';
  if(ld.tgtType==="infantry"){
    h+='<div class="lbl">歩兵の位置</div><div class="btns">';
    h+='<button class="b sm'+(!ld.tgtInBuilding?' on':'')+'" onclick="LATWset(\'tgtInBuilding\',false)">屋外</button>';
    h+='<button class="b sm'+(ld.tgtInBuilding?' on':'')+'" onclick="LATWset(\'tgtInBuilding\',true)">建物内（'+w.infantryBuilding+'FP列）</button>';
    h+='</div>';
  }

  // PF未熟兵
  if(w.oneShot){
    h+='<div class="lbl">発射ユニット</div><div class="btns">';
    h+='<button class="b sm'+(!ld.inexperienced?' on':'')+'" onclick="LATWset(\'inexperienced\',false)">通常</button>';
    h+='<button class="b sm red'+(ld.inexperienced?' on':'')+'" onclick="LATWset(\'inexperienced\',true)">未熟兵（DR11-12=ミス+損耗）</button>';
    h+='</div>';
  }

  // バックブラスト
  if(w.backblast){
    h+='<div class="lbl">発射位置</div><div class="btns">';
    h+='<button class="b sm'+(!ld.inBuilding?' on':'')+'" onclick="LATWset(\'inBuilding\',false)">屋外</button>';
    h+='<button class="b sm'+(ld.inBuilding?' on':'')+'" onclick="LATWset(\'inBuilding\',true)">建物内（バックブラスト）</button>';
    h+='</div>';
    if(ld.inBuilding){
      h+='<div class="lbl">建物内射撃オプション</div><div class="btns">';
      h+='<button class="b sm'+(ld.drm.backblast?' on':'')+'" onclick="LATWsetDRM(\'backblast\',true)">+2 DRM（バックブラスト回避）</button>';
      h+='<button class="b sm red'+(!ld.drm.backblast?' on':'')+'" onclick="LATWsetDRM(\'backblast\',false)">DRM無し（バックブラスト判定あり）</button>';
      h+='</div>';
    }
  }

  // TEM/妨害
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:6px 0">';
  h+='<div style="background:#0a0e18;border:1px solid #1a1a2e;border-radius:3px;padding:5px">';
  h+='<div style="font-size:8px;color:#8899aa;margin-bottom:3px">TEM</div><div class="btns" style="margin:0">';
  TEM_LIST.forEach(function(t){
    var sel=(ld.drm.tem===t.v&&ld.drm.temId===t.id);
    h+='<button class="b sm'+(sel?' on':'')+'" style="padding:1px 4px" onclick="LATWsetTEM(\''+t.id+'\','+t.v+')">'+t.lbl+(t.v>0?' +'+t.v:'')+'</button>';
  });
  h+='</div></div>';
  h+='<div style="background:#0a0e18;border:1px solid #1a1a2e;border-radius:3px;padding:5px">';
  h+='<div style="font-size:8px;color:#8899aa;margin-bottom:3px">妨害</div><div class="btns" style="margin:0">';
  [0,1,2,3].forEach(function(v){
    h+='<button class="b sm'+(ld.drm.hinder===v?' on':'')+'" style="padding:1px 6px" onclick="LATWsetDRM(\'hinder\','+v+')">+'+v+'</button>';
  });
  h+='</div></div></div>';

  var totalDRM=ld.drm.tem+ld.drm.hinder+(ld.drm.backblast?2:0);
  var curTH=ld.range>0?latwTH(w,ld.range):0;
  h+='<div class="infobox" style="color:#8899aa">合計DRM: '+(totalDRM>=0?'+':'')+totalDRM
    +(curTH>0?' → 有効TH#: <strong style="color:#4499ee">'+(curTH-totalDRM)+'</strong>':'')+'</div>';

  // ダイス
  h+='<div class="lbl" style="margin-top:6px">サイコロ</div>';
  h+=rDiceHTML(ld.wd,false,'LATWwd');
  h+=rDiceHTML(ld.rd,true,'LATWrd');
  if(ld.wd&&ld.rd){h+='<button class="judg3d" onclick="LATW_JUDGE_TH()">TH判定実行</button>';}

  // TH結果
  if(ld.th_result){
    var r=ld.th_result,col=r.hit?'#4a8a4a':r.pfSelfHit?'#cc3333':'#8a4a4a';
    h+='<div style="background:#0d0d14;border:2px solid '+col+'44;border-radius:5px;padding:10px;margin-top:8px">';
    h+='<div style="font-size:10px;color:#8899aa">DR '+r.dr+' + DRM '+(r.drm>=0?'+':'')+r.drm+' = 修正後 <strong>'+r.modDr+'</strong> vs TH# <strong>'+r.thNum+'</strong></div>';
    if(r.pfSelfHit) h+='<div style="font-size:14px;font-weight:bold;color:#cc3333">❌ ミス＋損耗（PF DR'+r.dr+'） — 発射ユニットに損耗</div>';
    else if(r.isCH) h+='<div style="font-size:14px;font-weight:bold;color:#ff6600">⚡ クリティカルヒット！（原DR=2）</div>';
    else if(r.hit)  h+='<div style="font-size:15px;font-weight:bold;color:#4a8a4a">✅ 命中！ STEP 2へ</div>';
    else            h+='<div style="font-size:14px;font-weight:bold;color:#8a4a4a">❌ 外れ</div>';
    h+='</div>';
  }
  h+='</div>';

  // バックブラスト結果（建物内・DRM無し）
  if(ld.inBuilding&&!ld.drm.backblast&&w.backblast&&ld.th_result&&ld.rd){
    h+='<div class="card"><div class="sh">バックブラスト判定</div>';
    h+='<div style="font-size:8px;color:#8899aa;margin-bottom:5px">赤ダイ('+ld.rd+')で1FP列を即時解決（TEM不適用）。同ヘクス全員が対象。</div>';
    var bbIt=iftR(1,ld.rd),bbRes=rm(bbIt.r);
    h+='<div style="background:#0d0d14;border:2px solid '+bbRes.c+'44;border-radius:4px;padding:8px">';
    h+='<div style="font-size:9px;color:#8899aa">1FP列 赤DR='+ld.rd+'</div>';
    h+='<div style="font-size:14px;font-weight:bold;color:'+bbRes.c+'">'+bbRes.i+' '+bbRes.t+'</div>';
    h+='</div></div>';
  }

  // STEP 2 (命中後)
  if(ld.th_result&&ld.th_result.hit){
    var isCH=ld.th_result.isCH,ammo0=w.ammo[0]||{},tk=(ammo0.tk||15)*(isCH?2:1);
    h+='<div class="card"><div class="sh">STEP 2: 効果判定'+(isCH?' <span style="color:#ff6600;font-size:9px">⚡CH</span>':'')+'</div>';
    if(ld.tgtType==="infantry"&&ld.tgtInBuilding){
      var fp=isCH?w.infantryBuilding*2:w.infantryBuilding;
      h+='<div class="infobox" style="color:#c8a032">建物内歩兵 → '+fp+'FP列IFT解決'+(isCH?' (CH:FP×2)':'')+'</div>';
    } else if(ld.tgtType==="infantry"){
      h+='<div class="infobox" style="color:#c8a032">屋外歩兵 → '+(isCH?2:1)+'FP列IFT解決（AP相当）</div>';
    } else {
      h+='<div style="text-align:center;padding:6px;color:#4499ee;font-size:14px">TK# = <strong>'+tk+'</strong>'+(isCH?' (CH:TK#×2)':'')+'</div>';
    }
    h+='<div class="lbl">サイコロ（2d6）</div>';
    h+=rDiceHTML(ld.ift_wd,false,'LATWift_wd');
    h+=rDiceHTML(ld.ift_rd,true,'LATWift_rd');
    if(ld.ift_wd&&ld.ift_rd){h+='<button class="judg3d" onclick="LATW_JUDGE_IFT()">効果判定実行</button>';}
    if(ld.ift_result){
      var ir=ld.ift_result,bc=ir.type==="TK"?(ir.kill?'#4a8a4a':'#8a4a4a'):(ir.res?ir.res.c:'#4499ee');
      h+='<div style="background:#0d0d14;border:2px solid '+bc+'44;border-radius:5px;padding:10px;margin-top:8px">';
      if(ir.type==="TK"){
        h+='<div style="font-size:10px;color:#8899aa">DR '+ir.dr+' vs TK# '+ir.tkNum+'</div>';
        h+='<div style="font-size:16px;font-weight:bold;color:'+bc+'">'+(ir.kill?'✅ 撃破！':'❌ 効果なし')+'</div>';
      } else {
        h+='<div style="font-size:10px;color:#8899aa">DR '+ir.dr+' FP列: '+ir.col+'</div>';
        h+='<div style="font-size:16px;font-weight:bold;color:'+ir.res.c+'">'+ir.res.i+' '+ir.res.t+'</div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }

  h+='<div class="card"><div class="sh">Shot Reset</div>';
  h+='<button class="b" onclick="S.latw=deepCopy(INIT_LATW);Draw()">全リセット</button>';
  h+='<button class="b" style="margin-left:4px" onclick="S.latw.th_result=null;S.latw.ift_result=null;S.latw.wd=0;S.latw.rd=0;S.latw.ift_wd=0;S.latw.ift_rd=0;Draw()">次の射撃へ</button>';
  h+='</div>';
  return h;
}
