.btns{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px}
.b{background:#111;border:1px solid #333;color:#777;padding:7px 11px;border-radius:3px;font-family:monospace;font-size:12px;cursor:pointer}
.b.on{background:#2a2a2a;border-color:#FFD700;color:#FFD700}
.b.red.on{background:#2a1010;border-color:#cc3333;color:#cc3333}

.df{font-size:30px;display:inline-block;vertical-align:middle}
.dbs{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.db{width:46px;height:46px;background:#111;border:1px solid #333;color:#777;border-radius:3px;font-size:16px;font-weight:bold;font-family:monospace;cursor:pointer}

.rv{font-size:28px;font-weight:bold}

.gh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ghL{color:#FFD700;font-size:12px;font-weight:bold}
.ghR{color:#FFD700;font-size:11px}
.delbtn{background:transparent;border:1px solid #aa0000;color:#aa0000;padding:1px 8px;border-radius:2px;font-size:11px;cursor:pointer}

.ul{font-size:14px;font-weight:bold}
.us{display:flex;gap:12px;margin-top:4px;font-size:11px;color:#777;flex-wrap:wrap}

.sumcard{background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:10px}

.ssr{background:#222;border:1px solid #FFD70033;border-radius:3px;padding:6px 8px;margin-bottom:4px;font-size:12px}
.addbtn{width:100%;background:transparent;border:1px dashed #333;color:#777;padding:8px;border-radius:3px;font-size:13px;font-family:monospace;cursor:pointer;margin-top:4px}

.npbtn{background:#1a1a1a;border:1px solid #333;color:#ddd;padding:12px 8px;border-radius:3px;font-size:16px;font-weight:bold;font-family:monospace;cursor:pointer;text-align:center}

// SW展開
function exSW(){
  var l=[];
  SWT.forEach(function(t){
    var n=S.fire.swc[t.id]||0;
    for(var i=0;i<n;i++)l.push({id:t.id,uid:t.id+"_"+i,lbl:n>1?t.lbl+" #"+(i+1):t.lbl,fp:t.fp,b:t.b,rof:t.rof});
  });
  return l;
}
function swMap(){var m={};exSW().forEach(function(s){m[s.uid]=s;});return m;}
function gfp(g){
  var m=swMap(),hs=g.ut==="hs",hasSW=g.sw.length>0;
  var base=(hs&&hasSW)?0:g.fp;
  var sf=g.sw.reduce(function(s,uid){return s+(m[uid]?m[uid].fp:0);},0);
  var f=base+sf;
  // クギ付け・指揮官単独は地域射撃×1/2
  if(g.st==="pinned"||g.ut==="smc")f/=2;
  if(S.fire.ph==="AFPh"){
    // AFPh: 全射撃×1/2(地域射撃)
    // PBF: ×2×1/2=等倍。下線FPあり→端数切り上げ後+1FP
    // TPBF: ×3×1/2=×1.5。下線FPあり→端数切り上げ後+1FP
    // 通常: ×1/2。下線FPあり→端数切り上げ後+1FP
    // 遠距離: ×1/4。下線FPのAssault Fireボーナス無効
    if(g.sh==="long"){
      f/=4; // AFPh半減＋遠距離半減=×1/4、Assault Fire無効
    } else if(g.sh==="pbf"){
      // PBF×2とAFPh×1/2が相殺→等倍
      if(g.af&&g.ut==="squad"){
        // 下線FP分隊のみAssault Fire：等倍のまま端数切り上げ不要(整数)→+1FP
        f=f+1;
      }
    } else if(g.sh==="tpbf"){
      f=f*3/2;
      if(g.af&&g.ut==="squad"){
        f=Math.ceil(f)+1;
      }
    } else {
      // 通常射程
      f=f/2;
      if(g.af&&g.ut==="squad"){
        f=Math.ceil(f)+1;
      }
    }
  } else {
    if(g.sh==="pbf")f*=2;
    else if(g.sh==="tpbf")f*=3;
    else if(g.sh==="long")f/=2;
  }
  return f;
}
function totalFP(){return Math.max(1,S.fire.grps.reduce(function(s,g){return s+gfp(g);},0));}
function losTotal(){return LOS.reduce(function(s,o){return s+((S.fire.los[o.id]||0)*o.d);},0);}
function fireDRM(){return S.fire.tem+S.fire.ldr+(S.fire.cx?1:0)+losTotal()+(S.fire.ffmo?-1:0)+(S.fire.ffnam?-1:0);}

  }
  return h;
}

// 射撃イベント
function FS(k,v){S.fire[k]=v;S.fire.res=null;Draw();}
function FT(k){S.fire[k]=!S.fire[k];S.fire.res=null;Draw();}
function FSW(id,d){
  var n=Math.max(0,Math.min(4,(S.fire.swc[id]||0)+d));
  if(n<(S.fire.swc[id]||0)){
    var ru=id+"_"+((S.fire.swc[id]||0)-1);
    S.fire.grps.forEach(function(g){g.sw=g.sw.filter(function(u){return u!==ru;});});
  }
  S.fire.swc[id]=n;S.fire.res=null;Draw();
}
function FLOS(id,d){S.fire.los[id]=Math.max(0,(S.fire.los[id]||0)+d);S.fire.res=null;Draw();}
function FGS(id,k,v){S.fire.grps.forEach(function(g){if(g.id===id)g[k]=v;});S.fire.res=null;Draw();}
function FSWg(gid,uid){
  S.fire.grps.forEach(function(g){
    if(g.id!==gid)return;
    var i=g.sw.indexOf(uid);
    if(i>=0)g.sw.splice(i,1);else g.sw.push(uid);
  });
  S.fire.res=null;Draw();
}
function FAG(){S.fire.grps.push({id:S.fire.nid++,ut:"squad",st:"good",fp:6,af:false,green:false,sh:"normal",sw:[]});S.fire.res=null;Draw();}
function FRG(id){S.fire.grps=S.fire.grps.filter(function(g){return g.id!==id;});S.fire.res=null;Draw();}
function FD(k,v){S.fire[k]=v;S.fire.res=null;Draw();}
function FRES(){S.fire.res=null;S.fire.rd=0;S.fire.wd=0;Draw();}
function FROLL(){
  roll(function(r,w){S.fire.rd=r;S.fire.wd=w;FJUDGE();});
}
function FJUDGE(){
  var f=S.fire,r=f.rd,w=f.wd;
  if(!r||!w)return;
  var raw=r+w,drm=fireDRM(),mod=raw+drm;
  var tp=totalFP(),it=ift(tp,mod);
  // 畏縮適用：列インデックスをcowerCols分低下(0未満にはしない)
  if(isCower&&cowerCols>0){
    var newCi=Math.max(0,it.ci-cowerCols);
    it={r:IFT[Math.max(0,Math.min(10,mod-2))][newCi],col:IFT_LBL[newCi],ci:newCi,cowered:true,cowerCols:cowerCols};
  }
  var insts=exSW();
  // 畏縮：ゾロ目かつ指揮官DRMなし。未熟兵グループがあれば2列低下
  var isCower=(r===w)&&f.ldr===0;
  var cowerCols=0;
  if(isCower){
    // 未熟兵が含まれるグループがあれば2列、なければ1列
    var hasGreen=f.grps.some(function(g){return g.green;});
    cowerCols=hasGreen?2:1;
  }
  var swr=insts.map(function(s){
    // ROF維持判定：①AFPh不可 ②クギ付けグループあり不可 ③畏縮発生時不可
    var hasPinned=f.grps.some(function(g){return g.st==="pinned";});
    var rofResult=null;
    if(s.rof>0){
      if(f.ph==="AFPh"){
        rofResult="AFPh→維持不可";
      } else if(hasPinned){
        rofResult="クギ付けあり→維持不可";
      } else if(isCower){
        rofResult="畏縮発生→維持不可";
      } else {
        rofResult=r<=s.rof?"維持成功":"維持失敗";
      }
    }
    return{lbl:s.lbl,b:s.b,fail:s.b<99&&raw>=s.b,ro:rofResult};
  });
  // 残留FP計算(DFF/SFF/FPF時のみ)
  var res2=null;
  if(f.ph==="DFF"||f.ph==="SFF"||f.ph==="FPF"){
    var resSteps=[0,0,0,1,1,2,2,4,6,6,8]; // IFT列インデックス0〜10に対応
    var baseResIdx=it.ci;
    // プラスDRMの数だけ段階低下(CX+1・LOS妨害各+1・指揮官プラス修正+1)
    // マイナスDRMは考慮しない
    var plusDRM=(f.cx?1:0)+losTotal()+(f.ldr>0?f.ldr:0);
    var resIdx=Math.max(0,baseResIdx-plusDRM);
    var resStepsArr=[0,0,0,1,1,2,2,4,6,6,8];
    res2={fp:resStepsArr[resIdx]||0,plusDRM:plusDRM,baseCol:IFT_LBL[baseResIdx],adjCol:IFT_LBL[resIdx]};
  }
  f.res={raw:raw,mod:mod,drm:drm,ift:it,cow:isCower,cowerCols:cowerCols,swr:swr,res:res2};
  Draw();
}

function MSTAT(s,ef){
  if(s==="ok")return{t:"MC成功",c:"#FFD700",i:"👍"};
  if(s==="pin")return{t:"クギ付け状態",c:"#FFD700",i:"📌"};
  if(s==="brk")return{t:ef?"MC失敗＋クラス低下":"MC失敗→混乱＋DM",c:ef?"#cc3333":"#cc8800",i:ef?"‼":"😵"};
  if(s==="ptcOk")return{t:"PTC成功",c:"#FFD700",i:"👍"};

}
function MS(k,v){S.mc[k]=v;S.mc.res=null;Draw();}
function MD(k,v){S.mc[k]=v;S.mc.res=null;Draw();}
function MRES(){S.mc.res=null;S.mc.rd=0;S.mc.wd=0;Draw();}
function MROLL(){roll(function(r,w){S.mc.rd=r;S.mc.wd=w;MJUDGE();});}
function MJUDGE(){
  var m=S.mc,r=m.rd,w=m.wd;
  if(!r||!w)return;
  var mdrm=m.ptc?0:{NMC:0,"1MC":1,"2MC":2,"3MC":3}[m.type]||0;
  var tdrm=mdrm+m.ldr+(m.dm?4:0);
  var raw=r+w,mod=raw+tdrm,st,ef=false;
  if(raw===12)st="auto";
  else if(m.ptc)st=mod<=m.mor?"ptcOk":"pin";

    else if(mod===m.mor)st="pin";
    else{st="brk";if(m.utype==="mmc"&&!m.ldrImm&&mod>m.mor+m.elr)ef=true;}
  }
  S.mc.res={raw:raw,mod:mod,st:st,ef:ef};Draw();
}

}
function CS(k,v){S.cc[k]=v;S.cc.res=null;Draw();}
function CD(k,v){S.cc[k]=v;S.cc.res=null;Draw();}
function CRES(){S.cc.res=null;S.cc.rd=0;S.cc.wd=0;Draw();}
function CROLL(){roll(function(r,w){S.cc.rd=r;S.cc.wd=w;CJUDGE();});}
function CJUDGE(){
  var c=S.cc,r=c.rd,w=c.wd;
  if(!r||!w)return;
  function ratio(a,d){var rv=a/d;if(rv>=6)return 7;if(rv>=5)return 6;if(rv>=4)return 5;if(rv>=3)return 4;if(rv>=2)return 3;if(rv>=1)return 2;if(rv>=0.5)return 1;return 0;}
  var ri=ratio(c.af,c.df),elim=CCN[ri];
  var raw=r+w,mod=raw+c.adrm,st=mod<elim?"elim":mod===elim?"cas":"miss";
  S.cc.res={raw:raw,mod:mod,st:st,pro:raw===2};Draw();
}

// ===== RALLY =====
function RALLY(){
  var rl=S.rl;
  var drm=(rl.self?1:rl.ldr)+(rl.bld?-1:0)+(rl.dm?4:0);
  var h="";
  h+='<div class="card"><div class="sh">回復種別</div><div class="btns">';
  h+='<button class="b'+(rl.self?" on":"")+'" onclick="RS(\'self\',true)">自己回復(+1DRM)</button>';
  h+='<button class="b'+(rl.self?"":" on")+'" onclick="RS(\'self\',false)">指揮官回復(LDR)</button>';
  h+='</div>';
  if(!rl.self){
    h+='<div class="lbl">指揮官修正</div><div class="btns">';
    [["−1",-1],["−2",-2],["+1",1]].forEach(function(t){
      h+='<button class="b'+(rl.ldr===t[1]?" on":"")+'" onclick="RS(\'ldr\','+t[1]+')">'+t[0]+'</button>';
    });
    h+='</div>';
  }
  h+='</div>';
  h+='<div class="card"><div class="sh">ユニット設定</div>';
  h+='<div class="lbl">混乱士気値(カウンター裏面)</div><div class="btns">';
  [5,6,7,8,9].forEach(function(v){h+='<button class="b'+(rl.bm===v?" on":"")+'" onclick="RS(\'bm\','+v+')">'+v+'</button>';});
  h+='</div><div class="btns">';
  h+='<button class="b'+(rl.bld?" on":"")+'" onclick="RT(\'bld\')">林・建物内(−1)</button>';
  h+='<button class="b red'+(rl.dm?" on":"")+'" onclick="RT(\'dm\')">DM状態(+4)</button>';
  h+='</div></div>';
  h+='<div class="card" style="background:#222;font-size:12px;color:#777">混乱士気値'+rl.bm+' / DRM+'+drm+'</div>';
  h+='<div class="card"><div class="sh">回復ダイス</div>';
  h+='<div class="notebox">';
  h+='<div style="color:#FFD700;white-space:nowrap">✨ DR2(ゾロ目1-1)</div><div style="color:#777">→ 自動回復成功'+(rl.self?" + 指揮官誕生判定":"")+'</div>';
  h+='<div style="color:#cc3333;white-space:nowrap">💀 DR12(6-6)</div><div style="color:#777">→ 自動失敗＋損耗</div>';
  h+='</div>';
  h+=DR("🟥 色付きダイス",rl.rd,"#e74c3c","RD('rd',");
  h+=DR("⬜ 白ダイス",rl.wd,"#ccc","RD('wd',");
  h+=ROLLBTNS("RROLL","RJUDGE",rl.rd&&rl.wd);
  h+='</div>';
  if(rl.res){
    var r=rl.res,sm=RSTAT(r.st);
    h+='<div class="res" style="border-color:'+sm.c+'">';
    h+='<div class="rrow"><div><div class="lbl">修正前DR</div><div class="rv">'+r.raw+'</div></div>';
    h+='<span class="rarr">→</span>';
    h+='<div><div class="lbl">修正後DR(+'+drm+')</div><div class="rv" style="color:#FFD700">'+r.mod+'</div></div></div>';
    h+='<div class="rmain" style="background:#222;border:1px solid '+sm.c+'44;color:'+sm.c+'">'+sm.i+' '+sm.t+'</div>';
    if(r.pro)h+='<div class="rnote" style="color:#FFD700">🎖 DR=2(ゾロ目)→ 指揮官誕生判定</div>';
    h+='<button class="resetbtn" onclick="RRES()">↩ リセット</button></div>';
  }
  return h;
}
function RSTAT(s){
  if(s==="ok"||s==="a2")return{t:s==="a2"?"自動回復(DR2)":"回復成功！",c:"#FFD700",i:"👍"};
  if(s==="fail")return{t:"回復失敗(混乱継続)",c:"#cc8800",i:"😵"};
  return{t:"自動失敗＋損耗(DR12)",c:"#aa0000",i:"☠"};
}
function RS(k,v){S.rl[k]=v;S.rl.res=null;Draw();}
function RT(k){S.rl[k]=!S.rl[k];S.rl.res=null;Draw();}
function RD(k,v){S.rl[k]=v;S.rl.res=null;Draw();}
function RRES(){S.rl.res=null;S.rl.rd=0;S.rl.wd=0;Draw();}
function RROLL(){roll(function(r,w){S.rl.rd=r;S.rl.wd=w;RJUDGE();});}
function RJUDGE(){
  var rl=S.rl,r=rl.rd,w=rl.wd;
  if(!r||!w)return;
  var drm=(rl.self?1:rl.ldr)+(rl.bld?-1:0)+(rl.dm?4:0);
  var raw=r+w,mod=raw+drm,st;
  if(raw===2)st="a2";
  else if(raw===12)st="a12";
  else if(mod<=rl.bm)st="ok";
  else st="fail";
  S.rl.res={raw:raw,mod:mod,st:st,pro:raw===2&&rl.self};Draw();
}

// ===== SCEN =====
function SCEN(){
  var s=S.sc,h="";
  h+='<div class="card"><div class="sh">シナリオ選択</div><div style="display:flex;flex-wrap:wrap">';
  SCN.forEach(function(sc){
    h+='<button class="scbtn'+(s.sel===sc.id?" on":"")+'" onclick="SSEL(\''+sc.id+'\')">';
    h+='<div style="font-weight:bold;color:#FFD700">'+sc.id+'</div>';
    h+='<div style="font-size:10px;margin-top:2px">'+sc.jp+'</div></button>';
  });
  h+='</div></div>';
  if(s.sel){
    var sc=SCN.filter(function(x){return x.id===s.sel;})[0];
    h+='<div class="card">';
    h+='<div style="font-size:10px;color:#777">'+sc.id+' / '+sc.en+'</div>';
    h+='<div style="font-size:16px;font-weight:bold;color:#FFD700;margin:4px 0 6px">'+sc.jp+'</div>';
    h+='<div style="font-size:11px;color:#777;margin-bottom:6px">';
    h+='📍 '+sc.loc+'　📅 '+sc.dt+'　⏱ '+sc.trn+'ターン';
    if(sc.map)h+='<br>🗺 '+sc.map;
    if(sc.first)h+='<br>▶ '+sc.first;
    h+='</div>';
    h+='<div class="vbox"><div style="font-size:10px;color:#FFD700;margin-bottom:3px">🏆 勝利条件</div>'+sc.vic+'</div>';
    if(sc.bal){
      h+='<div style="font-size:11px;color:#777;margin-bottom:6px">';
      h+='<span style="color:#FFD700">⚖ バランス</span>　☆米有利：'+sc.bal.us+'　✚独/ソ有利：'+sc.bal.ger;
      h+='</div>';
    }
    if(sc.ssr&&sc.ssr.length)sc.ssr.forEach(function(r,i){h+='<div class="ssr">'+r+'</div>';});
    h+='</div>';
    Object.keys(sc.f).forEach(function(nat){
      var f=sc.f[nat],nc={USA:"#6699cc",GER:"#aa9966",SOV:"#996666"}[nat]||"#666";
      var nl={USA:"🇺🇸 米軍",GER:"🇩🇪 独軍",SOV:"🇷🇺 ソ連"}[nat]||nat;
      h+='<div class="card"><div style="font-size:13px;font-weight:bold;color:'+nc+';margin-bottom:6px">'+nl+' [ELR:'+f.elr+']</div>';
      f.u.forEach(function(u){h+='<div style="font-size:12px;color:#777;border-left:2px solid '+nc+'44;padding-left:6px;margin-bottom:3px">'+u+'</div>';});
      h+='</div>';
    });
  }
  return h;
}
function SSEL(id){S.sc.sel=id;Draw();}

// ===== UNIT =====
function UNIT(){
  var u=S.un,d=UNT[u.nat],nc=d.col,h="";
  h+='<div class="card"><div class="sh">国籍選択</div>';
  h+='<div style="display:flex;gap:6px;margin-bottom:10px">';
  Object.keys(UNT).forEach(function(k){
    h+='<button class="b'+(u.nat===k?" on":"")+' " style="flex:1" onclick="US(\'nat\',\''+k+'\')">'+UNT[k].lbl+'</button>';
  });
  h+='</div><div class="btns">';
  h+='<button class="b'+(u.tab==="mmc"?" on":"")+'" onclick="US(\'tab\',\'mmc\')">MMC(分隊・HS)</button>';
  h+='<button class="b'+(u.tab==="smc"?" on":"")+'" onclick="US(\'tab\',\'smc\')">SMC(指揮官)</button>';
  h+='<button class="b'+(u.tab==="sw"?" on":"")+'" onclick="US(\'tab\',\'sw\')">SW(支援火器)</button>';
  h+='</div></div>';
  if(u.tab==="mmc")d.mmc.forEach(function(m){
    h+='<div class="uc" style="border-left-color:'+(m.green?"#cc8800":nc)+'"><div class="ul">'+m.lbl;
    if(m.af)h+='<span style="font-size:10px;background:#FFD70022;border:1px solid #FFD70055;color:#FFD700;padding:1px 5px;border-radius:2px;margin-left:4px">FP下線(AF)</span>';
    if(m.sr)h+='<span style="font-size:10px;background:#33333322;border:1px solid #555;color:#aaa;padding:1px 5px;border-radius:2px;margin-left:4px">自己回復</span>';
    if(m.ei)h+='<span style="font-size:10px;background:#FFD70022;border:1px solid #FFD70055;color:#FFD700;padding:1px 5px;border-radius:2px;margin-left:4px">ELR免除</span>';
    if(m.hs)h+='<span style="font-size:10px;background:#33333322;border:1px solid #555;color:#aaa;padding:1px 5px;border-radius:2px;margin-left:4px">HS</span>';
    if(m.green)h+='<span style="font-size:10px;background:#cc880022;border:1px solid #cc880055;color:#cc8800;padding:1px 5px;border-radius:2px;margin-left:4px">未熟兵</span>';
    h+='</div>';
    h+='<div class="us">';
    h+='<span>FP <b style="color:#ddd">'+m.fp+'</b></span>';
    h+='<span>射程 <b style="color:#ddd">'+m.rng+'</b></span>';
    h+='<span>士気 <b style="color:#ddd">'+m.mor+'</b></span>';
    h+='<span>混乱士気 <b style="color:#ddd">'+m.bm+'</b></span>';
    if(m.smk)h+='<span>煙幕 <b style="color:#FFD700">'+m.smk+'</b></span>';
    h+='</div>';
    if(m.note)h+='<div style="font-size:10px;color:#555;margin-top:2px">'+m.note+'</div>';
    h+='</div>';
  });
  if(u.tab==="mmc"&&d.elr&&d.elr.length){
    h+='<div class="card"><div style="font-size:11px;color:#FFD700;margin-bottom:6px">⬇ ELR超過クラス低下チェーン</div>';
    d.elr.forEach(function(e){h+='<div style="font-size:11px;color:#777;padding:2px 0">'+e.from+' → <b style="color:#cc3333">'+e.to+'</b></div>';});
    h+='</div>';
  }
  if(u.tab==="smc")d.smc.forEach(function(s){
    var cc=s.cmd<0?"#FFD700":s.cmd>0?"#cc3333":"#777";
    h+='<div class="uc" style="border-left-color:'+nc+'"><div class="ul">'+s.lbl+'</div>';
    h+='<div class="us">';
    h+='<span>士気 <b style="color:#ddd">'+s.mor+'</b></span>';
    h+='<span>混乱士気 <b style="color:#ddd">['+s.bm+']</b></span>';
    h+='<span>指揮修正 <b style="color:'+cc+'">'+(s.cmd===0?"±0":s.cmd>0?"+"+s.cmd:s.cmd)+'</b></span>';
    h+='</div>';
    if(s.note)h+='<div style="font-size:10px;color:#555;margin-top:2px">'+s.note+'</div>';
    h+='</div>';
  });
  if(u.tab==="sw"){
    var swData=typeof SW_DETAIL!=="undefined"?SW_DETAIL:SWT;
    swData.forEach(function(s){
      h+='<div class="card"><div class="ul">'+(s.name||s.lbl)+'</div>';
      h+='<div class="us">';
      h+='<span>FP <b style="color:#ddd">'+s.fp+'</b></span>';
      if(s.rof!==undefined&&s.rof!=="—")h+='<span>ROF# <b style="color:#ddd">'+s.rof+'</b></span>';
      if(s.b&&s.b!=="—")h+='<span>B# <b style="color:#cc8800">'+s.b+'</b></span>';
      if(s.x&&s.x!=="—")h+='<span>X# <b style="color:#cc3333">'+s.x+'</b></span>';
      if(s.pp)h+='<span>PP <b style="color:#ddd">'+s.pp+'</b></span>';
      h+='</div>';
      if(s.note)h+='<div style="font-size:11px;color:#555;margin-top:4px;line-height:1.4">'+s.note+'</div>';
      h+='</div>';
    });
  }
  return h;
}
function US(k,v){S.un[k]=v;Draw();}

// テンキー入力
function NPAD(gid, digit){
  S.fire.grps.forEach(function(g){
    if(g.id!==gid){return;}
    if(digit==="C"){g.fp=0;}
    else if(digit==="BS"){g.fp=Math.floor(g.fp/10);}
    else{
      var next=g.fp*10+parseInt(digit);
      if(next<=30) g.fp=next;
    }
  });
  S.fire.result=null;
  Draw();
}

// ALL CLEAR
function ALLCLEAR(){
  S.fire={ph:"PFPh",swc:{},grps:[{id:1,ut:"squad",st:"good",fp:6,af:false,green:false,sh:"normal",sw:[]}],nid:2,
    tem:0,ldr:0,cx:false,los:{},ffmo:false,ffnam:false,rd:0,wd:0,res:null};
  S.mc={ptc:false,type:"NMC",utype:"mmc",mor:7,elr:3,ldrImm:false,ldr:0,dm:false,rd:0,wd:0,res:null};
  S.cc={af:4,df:4,adrm:0,rd:0,wd:0,res:null};
  S.rl={self:true,bm:7,bld:false,dm:false,ldr:-1,rd:0,wd:0,res:null};
  Draw();
}
// INIT
Draw();
</script>
